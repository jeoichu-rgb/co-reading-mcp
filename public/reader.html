<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Co-Reading</title>
    <link rel="stylesheet" href="/reader.css?v=3" />
  </head>
  <body>
    <main class="app">
      <section class="sidebar" aria-label="Library">
        <header class="topbar">
          <div>
            <p class="eyebrow">Co-Reading</p>
            <h1>Library</h1>
          </div>
          <div class="topbar-actions">
            <button id="import-book" class="icon-button" title="Import EPUB or TXT">＋</button>
            <button id="refresh" class="icon-button" title="Refresh library">↻</button>
            <button class="icon-button" title="返回主页" onclick="location.href='https://erikssheep.uk'">⌂</button>
          </div>
          <input id="import-file" type="file" accept=".epub,.txt,.text,.md,.markdown" multiple hidden />
        </header>
        <div id="books" class="books" aria-live="polite"></div>
      </section>

      <section class="chapters" aria-label="Chapters">
        <header class="panel-head">
          <div>
            <p id="book-meta" class="eyebrow">Choose a book</p>
            <h2 id="book-title">Reading shelf</h2>
          </div>
          <button id="back-to-shelf" class="secondary-button">← Library</button>
        </header>
        <div id="chunks" class="chunk-list"></div>
      </section>

      <section class="reader" aria-label="Reader">
        <header class="reader-head">
          <div>
            <p id="chunk-file" class="eyebrow">No chapter selected</p>
            <h2 id="chunk-title">Open a chapter to start reading</h2>
          </div>
          <div class="reader-actions">
            <button id="prev-chunk" class="icon-button" title="Previous chapter" disabled>‹</button>
            <button id="next-chunk" class="icon-button" title="Next chapter" disabled>›</button>
            <button id="font-smaller" class="icon-button" title="Smaller text">A−</button>
            <button id="font-larger" class="icon-button" title="Larger text">A+</button>
            <button id="show-card" class="secondary-button" disabled>Cards</button>
            <button id="export-book" class="secondary-button" disabled>Export</button>
            <button id="continue-reading" class="secondary-button" disabled>Continue</button>
            <button id="mark-read" class="secondary-button" disabled>Mark read</button>
          </div>
        </header>

        <article id="text" class="text">
          <p class="empty">Select a book and chapter. Highlight text to leave a note for Claude.</p>
        </article>

        <aside id="margins" class="margins" aria-label="Margin notes"></aside>

        <nav id="bottom-nav" class="bottom-nav" hidden>
          <button id="bottom-prev" class="secondary-button" disabled>‹ Previous</button>
          <button id="bottom-next" class="secondary-button" disabled>Next ›</button>
        </nav>

        <form id="note-form" class="note-form" hidden>
          <div class="quote-preview" id="quote-preview"></div>
          <div class="color-picker">
            <button type="button" class="color-dot active" data-color="yellow" title="Lemon yellow"></button>
            <button type="button" class="color-dot" data-color="blue" title="Smoke blue"></button>
            <button type="button" class="color-dot" data-color="grey" title="Light grey"></button>
          </div>
          <textarea id="note" rows="3" placeholder="Leave a note for Claude..."></textarea>
          <div class="form-actions">
            <button type="button" id="cancel-note" class="secondary-button">Cancel</button>
            <button type="submit" class="primary-button">Save note</button>
          </div>
        </form>

        <footer class="submitbar">
          <span id="status">Private notes stay local until you send them.</span>
          <div class="submit-actions">
            <button id="note-selection" class="secondary-button" disabled>Note selection</button>
            <button id="submit-notes" class="primary-button" disabled>Send to Claude</button>
          </div>
        </footer>

        <div id="toast" class="toast" hidden></div>

        <aside id="card-panel" class="card-panel" hidden aria-label="Reading card">
          <div class="card-panel-head">
            <div>
              <p class="eyebrow">Ritual Card</p>
              <h2>Shared trace</h2>
            </div>
            <button id="card-close" class="icon-button" title="Close">×</button>
          </div>
          <div id="card-preview" class="card-preview"></div>
          <div class="card-actions">
            <button id="card-random" class="secondary-button">Another version</button>
          </div>
        </aside>
      </section>
    </main>
    <script type="module" src="/reader.js?v=3"></script>
  </body>
</html>
